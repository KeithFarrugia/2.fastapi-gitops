# custom-values.yaml
replicaCount: 1

image:
  repository: fastapi-gitops-starter
  tag: latest
  pullPolicy: Never

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 10