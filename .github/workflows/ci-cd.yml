name: CI/CD Pipeline

on:
  release:
    types: [ published ]
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:

  # ===========================================================================
  # Linting Job
  # ===========================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # ---------------------------- Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------- Python Setup
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------- Start Linting
      - name: Run Ruff lint
        run: ruff check app/ tests/

  # ===========================================================================
  # Testing Job
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      # ---------------------------- Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------- Python Setup
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------- Tests
      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-fail-under=80


  # ===========================================================================
  # Build Docker Image Job
  # ===========================================================================

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      # ---------------------------- Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------- Registry Login
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------- Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ---------------------------- Generating and pushing the image
      - name: Build Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}/fastapi-gitops-starter

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG=${GITHUB_REF_NAME}
          else
            TAG=latest
          fi
          docker build -t $IMAGE_NAME:$TAG ./docker
          docker push $IMAGE_NAME:$TAG
